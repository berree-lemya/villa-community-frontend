<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vineyards — Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <h1>My Profile</h1>
      <p>Manage your account details</p>
    </div>
    <div class="page-body">
      <div style="max-width:560px;">

        <!-- Profile Card -->
        <div class="card" style="margin-bottom:24px;">
          <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px;">
            <div class="user-avatar" style="width:64px;height:64px;font-size:28px;" id="avatarEl">?</div>
            <div>
              <h2 style="font-size:24px;" id="profileName">—</h2>
              <div style="color:var(--accent);font-size:13px;margin-top:2px;" id="profileRole">—</div>
              <div style="color:var(--text2);font-size:13px;" id="profileVilla">—</div>
            </div>
          </div>

          <div class="form-group">
            <label>Full Name</label>
            <input type="text" class="form-control" id="editName"/>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="text" class="form-control" id="editEmail" disabled style="opacity:0.5;cursor:not-allowed;"/>
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="text" class="form-control" id="editPhone"/>
          </div>
          <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
        </div>

        <!-- Change Password -->
        <div class="card">
          <h3 style="font-size:18px;margin-bottom:20px;">Change Password</h3>
          <div class="form-group">
            <label>Current Password</label>
            <input type="password" class="form-control" id="currentPw"/>
          </div>
          <div class="form-group">
            <label>New Password</label>
            <input type="password" class="form-control" id="newPw"/>
          </div>
          <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" class="form-control" id="confirmPw"/>
          </div>
          <button class="btn btn-outline" onclick="changePassword()">Update Password</button>
        </div>

      </div>
    </div>
  </main>
</div>
<div class="toast-container"></div>
<script src="api.js"></script>
<script src="sidebar.js"></script>
<script>
  requireAuth();

  async function loadProfile() {
    try {
      const user = await api.get('/users/profile');
      const initials = user.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
      document.getElementById('avatarEl').textContent = initials;
      document.getElementById('profileName').textContent = user.name;
      document.getElementById('profileRole').textContent = user.role.toUpperCase();
      document.getElementById('profileVilla').textContent = user.villa_number ? `Villa ${user.villa_number}` : 'No villa assigned';
      document.getElementById('editName').value = user.name;
      document.getElementById('editEmail').value = user.email;
      document.getElementById('editPhone').value = user.phone || '';
    } catch(e) { showToast(e.message, 'error'); }
  }

  async function saveProfile() {
    const name = document.getElementById('editName').value.trim();
    const phone = document.getElementById('editPhone').value.trim();
    if (!name) { showToast('Name cannot be empty', 'error'); return; }
    try {
      const updated = await api.put('/users/profile', { name, phone });
      localStorage.setItem('user', JSON.stringify(updated.user));
      showToast('Profile updated!', 'success');
      loadProfile();
    } catch(e) { showToast(e.message, 'error'); }
  }

  async function changePassword() {
    const current = document.getElementById('currentPw').value;
    const newPw = document.getElementById('newPw').value;
    const confirm = document.getElementById('confirmPw').value;
    if (!current || !newPw) { showToast('Fill all password fields', 'error'); return; }
    if (newPw !== confirm) { showToast('Passwords do not match', 'error'); return; }
    if (newPw.length < 8) { showToast('Password must be at least 8 characters', 'error'); return; }
    try {
      await api.put('/auth/change-password', { current_password: current, new_password: newPw });
      showToast('Password updated!', 'success');
      document.getElementById('currentPw').value = '';
      document.getElementById('newPw').value = '';
      document.getElementById('confirmPw').value = '';
    } catch(e) { showToast(e.message, 'error'); }
  }

  loadProfile();
</script>
</body>
</html>
