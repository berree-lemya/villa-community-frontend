<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vineyards — Notifications</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header" style="display:flex;align-items:flex-end;justify-content:space-between;">
      <div>
        <h1>Notifications</h1>
        <p>Your recent activity and alerts</p>
      </div>
      <button class="btn btn-outline" onclick="markAllRead()">Mark all read</button>
    </div>
    <div class="page-body">
      <div id="notifList"><div class="loader"><div class="spinner"></div></div></div>
    </div>
  </main>
</div>
<div class="toast-container"></div>
<script src="api.js"></script>
<script src="sidebar.js"></script>
<script>
  requireAuth();

  async function loadNotifs() {
    try {
      const notifs = await api.get('/users/notifications');
      const el = document.getElementById('notifList');
      if (!notifs.length) {
        el.innerHTML = `<div class="empty-state"><div class="icon">🔔</div><h3>No notifications</h3></div>`;
        return;
      }
      const icons = { success:'✅', warning:'⚠️', error:'❌', info:'ℹ️' };
      el.innerHTML = notifs.map(n => `
        <div style="display:flex;gap:16px;padding:18px 20px;background:var(--bg2);border:1px solid ${n.is_read ? 'var(--border)' : 'rgba(201,168,76,0.3)'};border-radius:12px;margin-bottom:10px;cursor:pointer;transition:border-color 0.2s;" onclick="markRead(${n.id}, this)">
          <div style="font-size:22px;flex-shrink:0;">${icons[n.notif_type] || 'ℹ️'}</div>
          <div style="flex:1;">
            <div style="display:flex;align-items:center;justify-content:space-between;">
              <strong style="font-size:15px;">${n.title}</strong>
              <span style="font-size:12px;color:var(--text2);">${fmtDate(n.created_at)}</span>
            </div>
            <p style="color:var(--text2);font-size:13px;margin-top:4px;">${n.message}</p>
          </div>
          ${!n.is_read ? '<div style="width:8px;height:8px;background:var(--accent);border-radius:50%;flex-shrink:0;margin-top:6px;"></div>' : ''}
        </div>`).join('');
    } catch(e) { showToast(e.message, 'error'); }
  }

  async function markRead(id, el) {
    try {
      await api.put(`/users/notifications/${id}/read`);
      el.style.borderColor = 'var(--border)';
      el.querySelector('div[style*="background:var(--accent)"]')?.remove();
    } catch(e) {}
  }

  async function markAllRead() {
    try {
      await api.put('/users/notifications/read-all');
      showToast('All marked as read', 'success');
      loadNotifs();
    } catch(e) { showToast(e.message, 'error'); }
  }

  loadNotifs();
</script>
</body>
</html>
