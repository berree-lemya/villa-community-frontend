<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vineyards — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #1a1a24;
      --border: rgba(255,255,255,0.07);
      --accent: #c9a84c;
      --accent2: #e8c97a;
      --text: #e8e8f0;
      --text2: #9090a8;
      --danger: #e05555;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* Left panel */
    .left-panel {
      flex: 1;
      background: url('login_bg.jpg') center center / cover no-repeat;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
      position: relative;
      overflow: hidden;
    }

    /* Dark gradient overlay so text stays legible */
    .left-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(10,10,15,0.72) 0%,
        rgba(10,10,15,0.52) 50%,
        rgba(10,10,15,0.70) 100%
      );
      pointer-events: none;
    }

    /* Accent glow on top of overlay */
    .left-panel::after {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(201,168,76,0.10) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* Content sits above both pseudo-elements */
    .left-panel > * { position: relative; z-index: 1; }

    .brand-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 52px;
      font-weight: 300;
      color: var(--accent);
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      animation: fadeUp 0.8s ease both;
    }

    .brand-sub {
      font-size: 12px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: 60px;
      animation: fadeUp 0.8s 0.1s ease both;
    }

    .features {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 340px;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .feature-icon {
      font-size: 24px;
      width: 44px; height: 44px;
      background: rgba(201,168,76,0.1);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .feature-text h4 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      margin-bottom: 2px;
    }

    .feature-text p { font-size: 12px; color: var(--text2); }

    /* Right panel - Login form */
    .right-panel {
      width: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 50px;
    }

    .login-box { width: 100%; animation: fadeUp 0.6s ease both; }

    .login-box h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      margin-bottom: 6px;
    }

    .login-box p { color: var(--text2); font-size: 14px; margin-bottom: 36px; }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      font-size: 11px;
      color: var(--text2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .form-control {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-control:focus { border-color: var(--accent); }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.05em;
      margin-top: 8px;
      transition: all 0.2s;
    }
    .btn-login:hover { background: var(--accent2); transform: translateY(-1px); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .error-msg {
      background: rgba(224,85,85,0.1);
      border: 1px solid rgba(224,85,85,0.3);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--danger);
      margin-bottom: 16px;
      display: none;
    }

    .register-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text2);
    }

    .register-link a { color: var(--accent); cursor: pointer; }
    .register-link a:hover { color: var(--accent2); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .left-panel { display: none; }
      .right-panel { width: 100%; padding: 40px 24px; }
    }
  </style>
</head>
<body>

  <!-- Left Panel -->
  <div class="left-panel">
    <div class="brand-logo">Vineyards</div>
    <div class="brand-sub">Community Living</div>
    <div class="features">
      <div class="feature-item">
        <div class="feature-icon">🎾</div>
        <div class="feature-text">
          <h4>Amenity Booking</h4>
          <p>Book tennis courts & swimming pool</p>
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">🔧</div>
        <div class="feature-text">
          <h4>Maintenance</h4>
          <p>Request electrician, plumber, carpenter</p>
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">🚪</div>
        <div class="feature-text">
          <h4>Gate Access</h4>
          <p>Manage visitors & maids digitally</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Panel - Login Form -->
  <div class="right-panel">
    <div class="login-box">
      <h2>Welcome back</h2>
      <p>Sign in to your Vineyards account</p>

      <div class="error-msg" id="errorMsg"></div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-control" id="password" placeholder="••••••••" />
      </div>

      <button class="btn-login" id="loginBtn" onclick="handleLogin()">Sign In</button>

      <div class="register-link">
        Don't have an account? <a onclick="window.location.href='register.html'">Register here</a>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    // If already logged in, redirect to dashboard
    if (localStorage.getItem('access_token')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') handleLogin();
    });

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');

      errorMsg.style.display = 'none';

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const data = await api.post('/auth/login', { email, password });
        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('refresh_token', data.refresh_token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'dashboard.html';
      } catch (err) {
        showError(err.message || 'Invalid email or password.');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
